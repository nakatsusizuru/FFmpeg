name: Windows x64 FFmpeg with libmpeghdec

on:
  workflow_dispatch:
    inputs:
      mpeghdec_repository:
        description: GitHub repository to use for libmpeghdec
        required: true
        default: nakatsusizuru/mpeghdec
      mpeghdec_ref:
        description: Branch, tag, or commit to use for libmpeghdec
        required: true
        default: main
  push:
    branches:
      - master
      - main
    paths:
      - ".github/workflows/windows-x64-libmpeghdec.yml"
      - "configure"
      - "ffbuild/**"
      - "fftools/**"
      - "libavcodec/**"
      - "libavdevice/**"
      - "libavfilter/**"
      - "libavformat/**"
      - "libavutil/**"
      - "libswresample/**"
      - "libswscale/**"

permissions:
  contents: read

jobs:
  build:
    name: Build Windows x64
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout FFmpeg
        uses: actions/checkout@v7
        with:
          path: ffmpeg

      - name: Checkout libmpeghdec
        uses: actions/checkout@v7
        with:
          repository: ${{ github.event.inputs.mpeghdec_repository || 'nakatsusizuru/mpeghdec' }}
          ref: ${{ github.event.inputs.mpeghdec_ref || 'main' }}
          path: mpeghdec

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            git
            make
            nasm
            yasm
            pkgconf
            diffutils
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkgconf

      - name: Build and install libmpeghdec
        run: |
          set -euo pipefail
          workspace="$(cygpath -u "$GITHUB_WORKSPACE")"
          deps_prefix="$workspace/deps/mingw64"

          cmake -S mpeghdec -B build-mpeghdec -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$deps_prefix" \
            -DBUILD_SHARED_LIBS=OFF \
            -Dmpeghdec_BUILD_DECODER=ON \
            -Dmpeghdec_BUILD_UIMANAGER=OFF \
            -Dmpeghdec_BUILD_BINARIES=OFF \
            -Dmpeghdec_BUILD_DOC=OFF

          cmake --build build-mpeghdec --config Release
          cmake --install build-mpeghdec --config Release

          pc_file="$deps_prefix/share/pkgconfig/mpeghdec.pc"
          cat > "$pc_file" <<EOF
          prefix=$deps_prefix
          includedir=\${prefix}/include
          libdir=\${prefix}/lib

          Name: mpeghdec
          Description: The Fraunhofer MPEG-H decoder
          URL: https://github.com/Fraunhofer-IIS/mpeghdec
          Version: 4.0.0
          Cflags: -I\${includedir} -DMPEGHDEC_STATIC
          Libs: -L\${libdir} -lmpeghdec -lstdc++ -lwinpthread -lm
          EOF

          export PKG_CONFIG_PATH="$deps_prefix/share/pkgconfig"
          export PKG_CONFIG_LIBDIR="$PKG_CONFIG_PATH"
          cat "$pc_file"
          pkg-config --define-prefix --modversion mpeghdec
          pkg-config --define-prefix --cflags --libs mpeghdec

          cat > /tmp/check_mpeghdec.c <<'EOF'
          #include <mpeghdec/mpeghdecoder.h>
          int main(void) {
              return mpeghdecoder_init(0) != 0;
          }
          EOF
          gcc /tmp/check_mpeghdec.c $(pkg-config --define-prefix --cflags --libs mpeghdec) -o /tmp/check_mpeghdec.exe

      - name: Configure FFmpeg
        run: |
          set -euo pipefail
          workspace="$(cygpath -u "$GITHUB_WORKSPACE")"
          deps_prefix="$workspace/deps/mingw64"

          cd ffmpeg

          export PKG_CONFIG_PATH="$deps_prefix/share/pkgconfig"
          export PKG_CONFIG_LIBDIR="$PKG_CONFIG_PATH"
          pkg-config --define-prefix --modversion mpeghdec
          pkg-config --define-prefix --cflags --libs mpeghdec

          configure_args=(
            --prefix="$workspace/ffmpeg-install"
            --target-os=mingw32
            --arch=x86_64
            --enable-static
            --disable-shared
            --disable-doc
            --disable-debug
            --enable-nonfree
            --enable-libmpeghdec
            --pkg-config=pkg-config
            --extra-cflags="-I$deps_prefix/include -DMPEGHDEC_STATIC"
            --extra-ldflags="-L$deps_prefix/lib"
            --extra-libs="-lstdc++ -lwinpthread"
          )

          if ! ./configure "${configure_args[@]}"; then
            tail -n 200 ffbuild/config.log || true
            exit 1
          fi

          grep -E "libmpeghdec|nonfree|License" ffbuild/config.log | tail -n 80 || true
          grep "#define CONFIG_LIBMPEGHDEC_DECODER 1" config_components.h

      - name: Build FFmpeg
        run: |
          set -euo pipefail
          cd ffmpeg
          make -j"$(nproc)" ffmpeg ffprobe
          make install-progs

      - name: Verify binaries
        run: |
          set -euo pipefail
          workspace="$(cygpath -u "$GITHUB_WORKSPACE")"
          "$workspace/ffmpeg/ffmpeg.exe" -hide_banner -decoders | grep libmpeghdec
          "$workspace/ffmpeg/ffmpeg.exe" -hide_banner -buildconf

      - name: Upload configure log on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: ffmpeg-config-log
          path: ffmpeg/ffbuild/config.log
          if-no-files-found: ignore

      - name: Package artifact
        run: |
          set -euo pipefail
          mkdir -p artifact
          cp ffmpeg/ffmpeg.exe artifact/
          cp ffmpeg/ffprobe.exe artifact/
          cp ffmpeg/LICENSE.md artifact/FFmpeg-LICENSE.md
          cp mpeghdec/LICENSE.txt artifact/libmpeghdec-LICENSE.txt
          cp mpeghdec/AUTHORS.md artifact/libmpeghdec-AUTHORS.md
          7z a ffmpeg-windows-x64-libmpeghdec.zip ./artifact/*

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ffmpeg-windows-x64-libmpeghdec
          path: ffmpeg-windows-x64-libmpeghdec.zip
          if-no-files-found: error
