name: Windows x64 FFmpeg with libmpeghdec (Simple)

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build Windows x64
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout FFmpeg
        uses: actions/checkout@v7
        with:
          path: ffmpeg

      - name: Checkout libmpeghdec
        uses: actions/checkout@v7
        with:
          repository: nakatsusizuru/mpeghdec
          ref: main
          path: mpeghdec

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            git
            make
            nasm
            yasm
            pkgconf
            diffutils
            p7zip
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-SDL2

      - name: Build and install libmpeghdec
        run: |
          set -euo pipefail
          workspace="$(cygpath -u "$GITHUB_WORKSPACE")"
          deps_prefix="$workspace/deps/mingw64"

          cmake -S mpeghdec -B build-mpeghdec -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$deps_prefix" \
            -DBUILD_SHARED_LIBS=OFF

          cmake --build build-mpeghdec --config Release
          cmake --install build-mpeghdec --config Release

      - name: Configure FFmpeg
        run: |
          set -euo pipefail
          workspace="$(cygpath -u "$GITHUB_WORKSPACE")"
          deps_prefix="$workspace/deps/mingw64"
          install_prefix="$workspace/ffmpeg-install"

          export PKG_CONFIG_PATH="$deps_prefix/lib/pkgconfig:$deps_prefix/share/pkgconfig"
          export PKG_CONFIG_LIBDIR="$PKG_CONFIG_PATH"

          cd ffmpeg

          ./configure \
            --prefix="$install_prefix" \
            --target-os=mingw32 \
            --arch=x86_64 \
            --enable-static \
            --disable-shared \
            --disable-doc \
            --disable-debug \
            --enable-nonfree \
            --enable-libmpeghdec \
            --enable-ffmpeg \
            --enable-ffprobe \
            --enable-ffplay \
            --enable-sdl2 \
            --pkg-config=pkg-config \
            --extra-cflags="-I$deps_prefix/include -DMPEGHDEC_STATIC" \
            --extra-ldflags="-static -L$deps_prefix/lib" \
            --extra-libs="-static-libgcc -static-libstdc++ -lstdc++ -lwinpthread -Wl,-Bstatic -lmpeghdec"

          grep -E "libmpeghdec|nonfree|License|ffplay|ffmpeg|ffprobe" ffbuild/config.log | tail -n 80 || true

      - name: Build FFmpeg
        run: |
          set -euo pipefail
          cd ffmpeg
          make -j"$(nproc)"

      - name: Install FFmpeg
        run: |
          set -euo pipefail
          cd ffmpeg
          make install

      - name: Verify binaries
        run: |
          set -euo pipefail
          workspace="$(cygpath -u "$GITHUB_WORKSPACE")"
          cd "$workspace/ffmpeg-install/bin"
          ls -la
          ./ffmpeg.exe -hide_banner -decoders | grep libmpeghdec
          ./ffmpeg.exe -hide_banner -version

      - name: Package artifact
        run: |
          set -euo pipefail
          workspace="$(cygpath -u "$GITHUB_WORKSPACE")"
          cd "$workspace/ffmpeg-install"
          7z a "$workspace/ffmpeg-windows-x64-libmpeghdec.zip" .

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ffmpeg-windows-x64-libmpeghdec
          path: ffmpeg-windows-x64-libmpeghdec.zip
          if-no-files-found: error
